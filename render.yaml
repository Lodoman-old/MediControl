databases:
  - name: medicontrol-db
    plan: free
    databaseName: medicontrol
    user: medicontrol
    ipAllowList: []

services:
  - type: web
    name: medicontrol-api
    runtime: image
    plan: free
    repo: https://github.com/Lodoman-old/MediControl
    dockerContext: .
    dockerfilePath: ./apps/api/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medicontrol-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://medicontrol-web.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: medicontrol-api.onrender.com
      - key: PORTAL_URL
        value: https://medicontrol-web.onrender.com
      - key: FEATURE_MERCADOPAGO_ENABLED
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: MFA_ENCRYPTION_KEY
        generateValue: true

  - type: static
    name: medicontrol-web
    plan: free
    repo: https://github.com/Lodoman-old/MediControl
    buildCommand: npm install -g pnpm@9.12.0 && pnpm install --frozen-lockfile --filter @medicontrol/web && pnpm --filter @medicontrol/web build
    staticPublishPath: ./apps/web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: VITE_API_URL
        value: https://medicontrol-api.onrender.com/api/v1
