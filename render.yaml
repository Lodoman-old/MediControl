services:
  - type: web
    name: medicontrol-api
    runtime: image
    plan: free
    repo: https://github.com/Lodoman-old/MediControl
    branch: master
    dockerContext: .
    dockerfilePath: ./apps/api/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        value: medicontrol-access-secret-fijo-no-cambiar-2026
      - key: JWT_REFRESH_SECRET
        value: medicontrol-refresh-secret-fijo-no-cambiar-2026
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://medicontrol-web.onrender.com,capacitor://localhost,http://localhost
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        value: medicontrol-api-h9x3.onrender.com
      - key: PORTAL_URL
        value: https://medicontrol-web.onrender.com
      - key: FEATURE_MERCADOPAGO_ENABLED
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: MFA_ENCRYPTION_KEY
        generateValue: true

  - type: static
    name: medicontrol-web
    plan: free
    repo: https://github.com/Lodoman-old/MediControl
    branch: master
    buildCommand: npm install -g pnpm@9.12.0 && pnpm --filter @medicontrol/web install --frozen-lockfile && pnpm --filter @medicontrol/web build
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: VITE_API_URL
        value: https://medicontrol-api-h9x3.onrender.com/api/v1
