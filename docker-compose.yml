version: "3.9"

# Servicios de desarrollo local para MediControl.
# Levantar con:  docker compose up -d
# Apagar con:    docker compose down
# Resetear vol:  docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: medicontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medicontrol
      POSTGRES_PASSWORD: medicontrol_dev_password
      POSTGRES_DB: medicontrol_dev
      TZ: America/Mexico_City
      PGTZ: America/Mexico_City
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_destination=stderr"
      - "-c"
      - "max_connections=200"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicontrol -d medicontrol_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medicontrol-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: medicontrol-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: medicontrol
      MINIO_ROOT_PASSWORD: medicontrol_dev_password
    ports:
      - "9002:9000"   # API S3
      - "9003:9001"   # Consola web
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: medicontrol-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 medicontrol medicontrol_dev_password;
      mc mb -p local/medicontrol-receipts-dev || true;
      mc mb -p local/medicontrol-prescriptions-dev || true;
      mc mb -p local/medicontrol-consents-dev || true;
      mc anonymous set download local/medicontrol-receipts-dev || true;
      echo 'MinIO buckets initialized';
      "

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: medicontrol-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: medicontrol-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/dashboards-provisioning:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  adminer:
    image: adminer:4
    container_name: medicontrol-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
